<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión con Menú Lateral</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Estilos rápidos para el buscador sin alterar tu CSS externo */
        .search-container {
            margin: 20px 0;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            outline: none;
        }
        .search-input:focus {
            border-color: #007bff;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>GESTION DE CLIENTES</h2>
        <button class="nav-btn active" onclick="showTab('seccion-cards', this)">Vista Tarjetas</button>
        <button class="nav-btn" onclick="showTab('seccion-tabla', this)">Módulo Aliados</button>
    </nav>

    <main class="main-content">
        <div><img src="logo.png" alt="Logo"></div>

        <div class="search-container">
            <input type="text" id="globalSearch" placeholder="🔍 Buscar cliente por nombre, NIT o servicio..." class="search-input" onkeyup="filtrarContenido()">
        </div>

        <div id="seccion-cards" class="tab-content active">
            <div class="c1-header">
                <h1>Gestión de Clientes</h1>
                <button class="btn btn-primary" onclick="abrirModalCrear()">+ Nuevo Cliente</button>
            </div>
            <div id="clientesContainer" class="clientes-grid">
                </div>

            <div id="modalCliente" class="modal hidden">
                <div class="modal-content">
                    <h3 id="modalTitulo">Nuevo Cliente</h3>
                    <form id="clienteForm">
                        <input type="hidden" id="clienteId">
                        <input type="text" id="nombre" placeholder="Nombre" required>
                        <input type="text" id="servicio" placeholder="Servicio" required>
                        <input type="text" id="nit" placeholder="NIT" required>
                        <input type="text" id="plan" placeholder="Plan">
                        <input type="date" id="fecha">
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button class="btn btn-primary" type="submit" style="flex:1">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="cerrarModal()" style="flex:1">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="seccion-tabla" class="tab-content">
            <div class="c2-container">
                <h2>Módulo de Gestión de Clientes (Aliados)</h2>
                <div class="form-group">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="name" class="c2-input" placeholder="Nombre del Cliente">
                    <input type="text" id="NIT" class="c2-input" placeholder="NIT">
                    <input type="text" id="state" class="c2-input" placeholder="Estado">
                    <input type="text" id="Plan" class="c2-input" placeholder="Plan">
                    <input type="text" id="Active since" class="c2-input" placeholder="Activo desde">
                    <button class="btn btn-add" onclick="saveClient()">Guardar / Actualizar</button>
                    <button class="btn btn-excel" onclick="downloadExcel()">Descargar Excel</button>
                </div>

                <table id="clientTable">
                    <thead>
                        <tr>
                            <th>ID</th><th>Cliente</th><th>NIT</th><th>Estado</th><th>Plan</th><th>Activo desde</th><th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr id="row-1">
                            <td>1</td><td>Adriana Wilches</td><td>828002088</td><td><span class="badge active">Activo</span></td><td>Plan premium</td><td>2024-01-15</td>
                            <td>
                                <button class="btn btn-edit" onclick="editRow(1)">Editar</button>
                                <button class="btn btn-suspend" onclick="toggleStatus(1)">Suspender</button>
                                <button class="btn btn-unlink" onclick="unlinkRow(1)">Desasociar</button>
                                <button class="btn btn-delete" onclick="deleteRow(1)">Eliminar</button>
                            </td>
                        </tr>
                        <tr id="row-2">
                            <td>2</td><td>Carlos Mendez</td><td>900123456</td><td><span class="badge suspended">Inactivo</span></td><td>Plan Basico</td><td>2023-09-10</td>
                            <td>
                                <button class="btn btn-edit" onclick="editRow(2)">Editar</button>
                                <button class="btn btn-suspend" onclick="toggleStatus(2)">Suspender</button>
                                <button class="btn btn-unlink" onclick="unlinkRow(2)">Desasociar</button>
                                <button class="btn btn-delete" onclick="deleteRow(2)">Eliminar</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="clientes.js"></script>
    <script>
        // FUNCIÓN DE BÚSQUEDA FILTRADA
        function filtrarContenido() {
            const searchText = document.getElementById('globalSearch').value.toLowerCase();
            
            // 1. Filtrar Filas de la Tabla
            const filas = document.querySelectorAll('#clientTable tbody tr');
            filas.forEach(fila => {
                const contenidoFila = fila.textContent.toLowerCase();
                fila.style.display = contenidoFila.includes(searchText) ? '' : 'none';
            });

            
            const tarjetas = document.querySelectorAll('#clientesContainer > div');
            tarjetas.forEach(tarjeta => {
                const contenidoTarjeta = tarjeta.textContent.toLowerCase();
                tarjeta.style.display = contenidoTarjeta.includes(searchText) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
